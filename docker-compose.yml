services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3333
      API_INTERNAL_URL: http://api:3333
      NEXT_DIST_DIR: /tmp/cvforge-app-next
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    volumes:
      - ./apps/app:/workspace/apps/app
      - ./packages/ui:/workspace/packages/ui
      - ./packages/types:/workspace/packages/types
      - ./packages/config:/workspace/packages/config

  landing:
    build:
      context: .
      dockerfile: docker/landing.Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3001:3001"
    environment:
      NEXT_DIST_DIR: /tmp/cvforge-landing-next
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/landing:/workspace/apps/landing
      - ./packages/ui:/workspace/packages/ui
      - ./packages/types:/workspace/packages/types
      - ./packages/config:/workspace/packages/config

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://cvforge:secret@postgres:5432/cvforge
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      PUPPETEER_URL: http://puppeteer:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3333
      SMTP_PROVIDER: ${SMTP_PROVIDER}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      AUTH_MAGIC_LINK_TTL_MINUTES: ${AUTH_MAGIC_LINK_TTL_MINUTES}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_STATE_FILE: ${AUTH_STATE_FILE:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - postgres
      - minio
      - redis
      - puppeteer
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/types:/workspace/packages/types
      - ./packages/config:/workspace/packages/config

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cvforge
      POSTGRES_USER: cvforge
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: cvforge
      MINIO_ROOT_PASSWORD: secretminio
    volumes:
      - minio_data:/data

  puppeteer:
    build:
      context: .
      dockerfile: docker/puppeteer.Dockerfile
    ports:
      - "3002:3000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:
