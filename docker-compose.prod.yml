services:
  app:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NODE_ENV: production
    networks:
      - default
      - traefik-public
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.cvforge-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.cvforge-app.entrypoints=websecure"
      - "traefik.http.routers.cvforge-app.tls.certresolver=cloudflare"
      - "traefik.http.services.cvforge-app.loadbalancer.server.port=3000"
    ports: !override []

  landing:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NODE_ENV: production
    networks:
      - default
      - traefik-public
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.cvforge-landing.rule=Host(`${LANDING_DOMAIN}`)"
      - "traefik.http.routers.cvforge-landing.entrypoints=websecure"
      - "traefik.http.routers.cvforge-landing.tls.certresolver=cloudflare"
      - "traefik.http.services.cvforge-landing.loadbalancer.server.port=3001"
    ports: !override []

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      PUPPETEER_URL: ${PUPPETEER_URL:-http://puppeteer:3000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    networks:
      - default
      - traefik-public
    expose:
      - "3333"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.cvforge-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.cvforge-api.entrypoints=websecure"
      - "traefik.http.routers.cvforge-api.tls.certresolver=cloudflare"
      - "traefik.http.services.cvforge-api.loadbalancer.server.port=3333"
    ports: !override []

  postgres:
    restart: unless-stopped
    ports: !override []

  minio:
    restart: unless-stopped
    ports: !override []

  puppeteer:
    restart: unless-stopped
    ports: !override []

  redis:
    restart: unless-stopped
    ports: !override []

networks:
  traefik-public:
    external: true
