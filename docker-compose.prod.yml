services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge
    labels:
      - traefik.enable=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal

  app:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NODE_ENV: production
    networks:
      - default
      - edge
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=cvforge_edge
      - traefik.http.routers.app.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port=3000
    ports: !override []

  landing:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NODE_ENV: production
    networks:
      - default
      - edge
    expose:
      - "3001"
    labels:
      - traefik.enable=true
      - traefik.docker.network=cvforge_edge
      - traefik.http.routers.landing.rule=Host(`${LANDING_DOMAIN}`)
      - traefik.http.routers.landing.entrypoints=websecure
      - traefik.http.routers.landing.tls=true
      - traefik.http.routers.landing.tls.certresolver=letsencrypt
      - traefik.http.services.landing.loadbalancer.server.port=3001
    ports: !override []

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      PUPPETEER_URL: ${PUPPETEER_URL:-http://puppeteer:3000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    networks:
      - default
      - edge
    expose:
      - "3333"
    labels:
      - traefik.enable=true
      - traefik.docker.network=cvforge_edge
      - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3333
    ports: !override []

  postgres:
    restart: unless-stopped
    ports: !override []

  minio:
    restart: unless-stopped
    ports: !override []

  puppeteer:
    restart: unless-stopped
    ports: !override []

  redis:
    restart: unless-stopped
    ports: !override []

volumes:
  traefik_letsencrypt:

networks:
  edge:
    name: cvforge_edge
